# Nginx upstream switch for DataDumpAI Enterprise v1.0 (Streamlit)
# Apply only after blue/green verification on port 8501.

server {
    server_name getdatadump.com www.getdatadump.com;

    client_max_body_size 50m;

    location = /og-image.png {
        alias /opt/datadumpai-enterprise-v1/static/og-image.png;
        access_log off;
        expires 7d;
    }

    location = /favicon.png {
        alias /opt/datadumpai-enterprise-v1/static/favicon.png;
        access_log off;
        expires 7d;
    }

    location = /logo.png {
        alias /opt/datadumpai-enterprise-v1/static/logo.png;
        access_log off;
        expires 7d;
    }

    location = /robots.txt {
        alias /opt/datadumpai-enterprise-v1/static/robots.txt;
        access_log off;
        expires 1d;
    }

    location = /sitemap.xml {
        alias /opt/datadumpai-enterprise-v1/static/sitemap.xml;
        access_log off;
        expires 1d;
    }

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /webhooks/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/getdatadump.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getdatadump.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.getdatadump.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = getdatadump.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name getdatadump.com www.getdatadump.com;
    return 404;
}
