name: Test DataDumpAI Enterprise

on:
  pull_request:
    branches:
      - main
  workflow_call:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python test suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          ENVIRONMENT: test
          AUTH_DEV_BYPASS: "false"
          DATABASE_BACKEND: json
          STORAGE_BACKEND: local
        run: pytest -q --tb=short

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare CI placeholder .env
        run: bash .github/scripts/prepare-ci-compose-env.sh

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

  validate-workflows:
    name: Validate workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="v1.7.7"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION#v}_linux_amd64.tar.gz" \
            | tar xz actionlint
          chmod +x actionlint

      - name: Lint GitHub Actions workflows
        run: ./actionlint
