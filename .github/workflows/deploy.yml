name: Deploy DataDumpAI Enterprise

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch name, tag, or commit SHA)"
        required: false
        default: "main"
        type: string
      skip_tests:
        description: "Skip the test gate (emergency use only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Prevent overlapping production deployments. Queued runs wait; none are cancelled mid-flight.
concurrency:
  group: production-deployment
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  test:
    name: Pre-deploy test gate
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true' }}
    uses: ./.github/workflows/test.yml

  validate:
    name: Validate deployment artifacts
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare CI placeholder .env
        run: bash .github/scripts/prepare-ci-compose-env.sh

      - name: Validate Docker Compose configuration
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate workflow syntax
        run: |
          ACTIONLINT_VERSION="v1.7.7"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION#v}_linux_amd64.tar.gz" \
            | tar xz actionlint
          chmod +x actionlint
          ./actionlint

      - name: Ensure deployment scripts are executable
        run: chmod +x .github/scripts/*.sh

  deploy:
    name: Deploy application stack
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Record deployment metadata
        id: meta
        run: |
          {
            echo "commit_sha=${GITHUB_SHA}"
            echo "commit_short=$(git rev-parse --short HEAD)"
            echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "deploy_ref=${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to production server
        id: ssh_deploy
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          DEPLOY_REF: ${{ steps.meta.outputs.deploy_ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 40m
          envs: DEPLOY_REF,GITHUB_RUN_ID
          script: |
            set -euo pipefail

            export APP_DIR="/opt/datadumpai-enterprise"
            export GIT_BRANCH="main"
            export AUTO_ROLLBACK="true"
            export DEPLOY_REF="${DEPLOY_REF}"
            export GITHUB_RUN_ID="${GITHUB_RUN_ID}"

            LOG_DIR="${APP_DIR}/.deploy/logs"
            LOG_FILE="${LOG_DIR}/deploy-${GITHUB_RUN_ID}.log"
            mkdir -p "$LOG_DIR"

            cd "$APP_DIR"

            {
              echo "Deploy ref: ${DEPLOY_REF}"
              echo "Workflow run: ${GITHUB_RUN_ID}"
              echo "Started (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)"

              git fetch origin --prune
              git reset --hard "${DEPLOY_REF}"
              chmod +x .github/scripts/*.sh

              bash .github/scripts/deploy.sh
            } 2>&1 | tee "$LOG_FILE"

            exit "${PIPESTATUS[0]}"

      - name: Append server diagnostics on failure
        if: failure()
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          envs: GITHUB_RUN_ID
          script: |
            set -euo pipefail
            APP_DIR="/opt/datadumpai-enterprise"
            LOG_FILE="${APP_DIR}/.deploy/logs/deploy-${GITHUB_RUN_ID}.log"

            {
              echo ""
              echo "========================================"
              echo "Post-failure diagnostics (UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ))"
              echo "========================================"
              echo ""
              echo "=== git HEAD ==="
              git -C "$APP_DIR" rev-parse HEAD || true
              echo ""
              echo "=== docker compose ps ==="
              docker compose -f "$APP_DIR/docker-compose.yml" ps || true
              echo ""
              echo "=== app logs (last 200 lines) ==="
              docker compose -f "$APP_DIR/docker-compose.yml" logs --tail 200 app || true
              echo ""
              echo "=== webhooks logs (last 200 lines) ==="
              docker compose -f "$APP_DIR/docker-compose.yml" logs --tail 200 webhooks || true
              echo ""
              echo "=== health probes ==="
              curl -fsS --max-time 10 http://127.0.0.1:8501/_stcore/health || echo "Streamlit health probe failed"
              curl -fsS --max-time 10 http://127.0.0.1:8001/health || echo "Webhook health probe failed"
            } >> "$LOG_FILE" 2>&1 || true

      - name: Download deployment logs
        if: failure()
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "/opt/datadumpai-enterprise/.deploy/logs/deploy-${{ github.run_id }}.log"
          target: deployment-artifacts/
          strip_components: 4

      - name: Upload deployment logs
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: deployment-logs-${{ github.run_id }}
          path: deployment-artifacts/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish deployment summary
        if: always()
        run: |
          finished_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          started_epoch="$(date -d "${{ steps.meta.outputs.started_at }}" +%s 2>/dev/null || echo 0)"
          finished_epoch="$(date -d "$finished_at" +%s)"
          if [ "$started_epoch" -gt 0 ]; then
            duration="$((finished_epoch - started_epoch))"
          else
            duration="unknown"
          fi

          {
            echo "## Deployment Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Repository | \`${{ github.repository }}\` |"
            echo "| Branch | \`main\` |"
            echo "| Commit | \`${{ steps.meta.outputs.commit_short }}\` (\`${{ steps.meta.outputs.commit_sha }}\`) |"
            echo "| Deploy ref | \`${{ steps.meta.outputs.deploy_ref }}\` |"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo "| Started (UTC) | \`${{ steps.meta.outputs.started_at }}\` |"
            echo "| Finished (UTC) | \`${finished_at}\` |"
            echo "| Duration | \`${duration}s\` |"
            echo "| Workflow run | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| Deploy step | \`${{ steps.ssh_deploy.outcome }}\` |"
            echo ""
            echo "### Health endpoints verified on server"
            echo "- Streamlit: \`http://127.0.0.1:8501/_stcore/health\`"
            echo "- Webhook API: \`http://127.0.0.1:8001/health\`"
            echo ""
            if [ "${{ steps.ssh_deploy.outcome }}" = "success" ]; then
              echo "**Overall status: SUCCESS**"
            else
              echo "**Overall status: FAILED**"
              echo ""
              echo "Deployment logs were uploaded as workflow artifact \`deployment-logs-${{ github.run_id }}\`."
              echo ""
              echo "If automatic rollback ran, inspect \`.deploy/pre-deploy-commit\` on the server."
              echo "Manual rollback: \`bash .github/scripts/rollback.sh\` on the server."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
