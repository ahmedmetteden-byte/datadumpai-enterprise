name: Release DataDumpAI Enterprise

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Pre-release test gate
    uses: ./.github/workflows/test.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"

          {
            echo "notes<<EOF"
            echo "## DataDumpAI Enterprise ${TAG}"
            echo ""
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since \`${PREVIOUS_TAG}\`:"
              echo ""
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${TAG}"
            else
              echo "Initial tagged release."
              echo ""
              git log --pretty=format:'- %s (%h)' -n 20
            fi
            echo ""
            echo ""
            echo "### Production deployment"
            echo ""
            echo "Application: https://app.getdatadump.com"
            echo "Marketing: https://getdatadump.com"
            echo ""
            echo "Deploys to production are triggered by pushes to \`main\`. To deploy this tag, merge the tagged commit into \`main\` or cherry-pick as needed."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: DataDumpAI Enterprise ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Publish release summary
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Tag | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Release | [\`${{ github.ref_name }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
