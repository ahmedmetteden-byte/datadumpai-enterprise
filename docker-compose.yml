services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - app_data:/app/data
      - ./assets:/app/assets:ro
      - ./static:/app/static
      - ./ui:/app/ui:ro
      - ./.streamlit:/app/.streamlit:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  webhooks:
    build: .
    env_file:
      - .env
    command:
      [
        "uvicorn",
        "api.webhook_server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
      ]
    ports:
      - "${WEBHOOK_PORT:-8001}:8001"
    volumes:
      - app_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  app_data:
